on:
  pull_request:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        java:
          - 17
          - 25
    steps:
    - uses: actions/checkout@v6
    - uses: sbt/setup-sbt@v1
    - uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.java }}
        distribution: zulu
    - run: sbt
           -v
           --server
           "all scalafmtSbtCheck scalafmtCheckAll"
           "scalafixAll --check"
           test
           coherenceCheck
           publishLocal
           scripted
